name: "NanoBot AI Assistant"
version: "0.2.24"
slug: "nanobot"
description: >-
  Ultra-lightweight personal AI assistant powered by NanoBot.
  Supports multiple LLM providers, Discord integration, and Home Assistant smart home control.
url: "https://github.com/HKUDS/nanobot"
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
ingress: false
panel_icon: mdi:cat
panel_title: "NanoBot"
webui: http://[HOST]:[PORT:18780]/dashboard
ports:
  18780/tcp: 18780
  18790/tcp: 18790
  8900/tcp: 8900
ports_description:
  18780/tcp: "NanoBot WebUI"
  18790/tcp: "NanoBot Gateway API"
  8900/tcp: "NanoBot OpenAI-compatible API (for HA Conversation integration)"
map:
  - type: data
    read_only: false
  - type: config
    read_only: false
homeassistant_api: true
services:
  - mqtt:need
options:
  llm_provider: "custom"
  llm_api_key: ""
  llm_base_url: ""
  llm_model: "claude-4.5"
  discord_enabled: false
  discord_bot_token: ""
  discord_channel_id: ""
  discord_allowed_users: "*"
  discord_group_policy: "open"
  log_level: "info"
  # Home Assistant MCP Integration (Phase 1)
  ha_mcp_enabled: false
  ha_mcp_url: ""
  ha_access_token: ""
  ha_read_only: true
  # OpenAI-compatible API for HA Conversation (Phase 2)
  api_enabled: false
  auto_conversation_agent: false
  # HA Event Streaming (Phase 3)
  ha_events_enabled: false
  ha_event_types: "state_changed"
  # MQTT Integration (Phase 4)
  mqtt_enabled: false
  # WebUI (Phase 5)
  webui_enabled: true
schema:
  llm_provider: "str"
  llm_api_key: "password"
  llm_base_url: "url?"
  llm_model: "str"
  discord_enabled: "bool"
  discord_bot_token: "password?"
  discord_channel_id: "str?"
  discord_allowed_users: "str?"
  discord_group_policy: "list(open|mention)?"
  log_level: "list(trace|debug|info|warning|error)"
  # Home Assistant MCP Integration
  ha_mcp_enabled: "bool"
  ha_mcp_url: "url?"
  ha_access_token: "password?"
  ha_read_only: "bool"
  # OpenAI-compatible API
  api_enabled: "bool"
  auto_conversation_agent: "bool"
  # HA Event Streaming
  ha_events_enabled: "bool"
  ha_event_types: "str?"
  # MQTT Integration
  mqtt_enabled: "bool"
  # WebUI
  webui_enabled: "bool"
