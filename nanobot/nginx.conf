worker_processes auto;
error_log /var/log/nginx/error.log;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8099;
        
        server_name _;

        # Enable sub_filter for URL rewriting
        sub_filter_once off;
        sub_filter_types text/html application/javascript text/css;
        
        # Replace relative /assets/ with absolute path to ingress
        # This fixes the 404 issue when running behind HA ingress
        sub_filter 'src="/assets/' 'src="/api/hassio_ingress/nanobot/assets/';
        sub_filter 'href="/assets/' 'href="/api/hassio_ingress/nanobot/assets/';
        
        # Icons and manifest
        sub_filter 'href="/icon.png"' 'href="/api/hassio_ingress/nanobot/icon.png"';
        sub_filter 'href="/manifest.webmanifest"' 'href="/api/hassio_ingress/nanobot/manifest.webmanifest"';
        sub_filter 'src="/app-' 'src="/api/hassio_ingress/nanobot/app-';

        # Serve static files with SPA fallback
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to Python backend
        location /api/ {
            proxy_pass http://127.0.0.1:18781;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Proxy WebSocket
        location /ws/ {
            proxy_pass http://127.0.0.1:18781;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
