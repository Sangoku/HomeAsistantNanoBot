user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 8099;
        listen [::]:8099;
        
        server_name localhost;
        
        root /usr/share/nginx/html;
        index index.html;

        # Static assets (JS, CSS, images) — long cache, direct serve
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Proxy API requests to WebUI backend
        location /api/ {
            proxy_pass http://127.0.0.1:18781;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Forward HA ingress path so backend can build correct URLs
            proxy_set_header X-Ingress-Path $http_x_ingress_path;
        }

        # WebSocket proxy
        location /ws/ {
            proxy_pass http://127.0.0.1:18781;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Ingress-Path $http_x_ingress_path;
        }

        # Socket.IO — used by nanobot-webui for real-time communication
        location /socket.io/ {
            proxy_pass http://127.0.0.1:18781;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Ingress-Path $http_x_ingress_path;
        }

        # SPA fallback — serve index.html for all non-file routes
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
