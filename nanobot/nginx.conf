server {
    listen 8099;
    
    server_name _;

    # Enable sub_filter for URL rewriting
    sub_filter_once off;
    sub_filter_types text/html application/javascript text/css text/javascript;
    sub_filter '="/assets/' '="/api/hassio_ingress/nanobot/assets/';
    sub_filter "='/assets/" "='/api/hassio_ingress/nanobot/assets/";
    sub_filter '/icon.png' '/api/hassio_ingress/nanobot/icon.png';
    sub_filter '/manifest.webmanifest' '/api/hassio_ingress/nanobot/manifest.webmanifest';
    sub_filter '/app-120x120.png' '/api/hassio_ingress/nanobot/app-120x120.png';
    sub_filter '/app-144x144.png' '/api/hassio_ingress/nanobot/app-144x144.png';
    sub_filter '/app-152x152.png' '/api/hassio_ingress/nanobot/app-152x152.png';
    sub_filter '/app-167x167.png' '/api/hassio_ingress/nanobot/app-167x167.png';
    sub_filter '/app-180x180.png' '/api/hassio_ingress/nanobot/app-180x180.png';

    # Serve static files with SPA fallback
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Python backend
    location /api/ {
        proxy_pass http://127.0.0.1:18781;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:18781;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
