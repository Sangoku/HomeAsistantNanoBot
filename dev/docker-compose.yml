name: nanobot-dev

# Local dev environment for nanobot addon testing
# Simulates the HA addon environment without a real Home Assistant Supervisor.
#
# Usage:
#   cd dev/
#   cp .env.example .env
#   # Edit .env with your real credentials
#   docker compose up --build
#
# NanoBot has NO web GUI — it's a headless AI agent.
# Interact with it via Discord (channel configured in dev/.env).
# Port 18790 is the NanoBot gateway (channels, cron, heartbeat).
# Port 8900 is the OpenAI-compatible API (requires api_enabled=true).

services:

  # ── NanoBot addon container ─────────────────────────────────────────────────
  nanobot:
    container_name: nanobot-dev-addon
    build:
      context: ../nanobot
      dockerfile: Dockerfile
      args:
        BUILD_FROM: ghcr.io/home-assistant/aarch64-base-python:3.12-alpine3.21
        BUILD_ARCH: aarch64
        BUILD_VERSION: "dev"
    environment:
      TZ: ${TZ:-Europe/Vienna}
      # Dummy supervisor token — run.sh handles missing bashio gracefully
      SUPERVISOR_TOKEN: "dev-token"
      # Credentials from dev/.env (gitignored) — override options.json values
      NANOBOT_LLM_PROVIDER: ${LLM_PROVIDER:-custom}
      NANOBOT_LLM_API_KEY: ${LLM_API_KEY:-}
      NANOBOT_LLM_BASE_URL: ${LLM_BASE_URL:-}
      NANOBOT_LLM_MODEL: ${LLM_MODEL:-claude-4.5}
      NANOBOT_DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      NANOBOT_DISCORD_CHANNEL_ID: ${DISCORD_CHANNEL_ID:-}
      NANOBOT_DISCORD_ALLOWED_USERS: ${DISCORD_ALLOWED_USERS:-*}
      NANOBOT_DISCORD_GROUP_POLICY: ${DISCORD_GROUP_POLICY:-open}
      # HA Integration settings
      NANOBOT_HA_MCP_ENABLED: ${HA_MCP_ENABLED:-false}
      NANOBOT_HA_MCP_URL: ${HA_MCP_URL:-}
      NANOBOT_HA_ACCESS_TOKEN: ${HA_ACCESS_TOKEN:-}
      NANOBOT_HA_READ_ONLY: ${HA_READ_ONLY:-true}
      NANOBOT_API_ENABLED: ${API_ENABLED:-false}
      NANOBOT_AUTO_CONVERSATION_AGENT: ${AUTO_CONVERSATION_AGENT:-false}
      NANOBOT_HA_EVENTS_ENABLED: ${HA_EVENTS_ENABLED:-false}
      NANOBOT_HA_EVENT_TYPES: ${HA_EVENT_TYPES:-state_changed}
      NANOBOT_MQTT_ENABLED: ${MQTT_ENABLED:-false}
      # MQTT broker (dev mode — no bashio service discovery)
      NANOBOT_MQTT_HOST: ${MQTT_HOST:-}
      NANOBOT_MQTT_PORT: ${MQTT_PORT:-1883}
      NANOBOT_MQTT_USER: ${MQTT_USER:-}
      NANOBOT_MQTT_PASS: ${MQTT_PASS:-}
    ports:
      - "18790:18790"   # NanoBot gateway (channels, cron, heartbeat)
      - "8900:8900"     # OpenAI-compatible API (when api_enabled=true)
    volumes:
      # Mock HA Supervisor options.json — template only, env vars take precedence
      - ./options.json:/data/options.json:ro
      # Persistent nanobot data (config, workspace, memory)
      - nanobot_data:/data/nanobot
      # NanoBot /config/nanobot — bind-mounted to dev/nanobot-workspace/ on the host.
      # This mirrors the real HA /config/nanobot path so you can edit files from VS Code
      # (or any HA file editor) and see them live inside the container.
      # Contains: config.json (generated on startup) + workspace/ (AI markdown files)
      - ./nanobot-workspace:/config/nanobot
      # Live-edit addon scripts without rebuilding the image
      - ../nanobot/run.sh:/run.sh:ro
      - ../nanobot/generate_config.py:/app/generate_config.py:ro
      - ../nanobot/nanobot_api_server.py:/app/nanobot_api_server.py:ro
      - ../nanobot/setup_conversation_agent.py:/app/setup_conversation_agent.py:ro
      - ../nanobot/ha_event_listener.py:/app/ha_event_listener.py:ro
      - ../nanobot/ha_mqtt_bridge.py:/app/ha_mqtt_bridge.py:ro
    restart: unless-stopped

volumes:
  nanobot_data:
